mission:
  name: driving_only_4f_5f_manual_buttons

  steps:
    - state: GO_TO_ELEVATOR_FRONT
      task: go_to
      target: elevator_front
      location: elevator_front_4f

    - state: ALIGN_ELEVATOR_TAG
      task: dock_to_marker
      target: elevator_panel_4f
      location: elevator_panel_4f
      extra:
        tag_pose_topic: /tag_pose
        cmd_vel_topic: /cmd_vel

    # Manual step: press the 4F elevator call button.

    - state: WAIT_ELEVATOR_OPEN
      task: wait_door_open
      target: elevator_door_4f
      location: elevator_door_4f
      extra:
        scan_topic: /scan_filtered

    - state: ENTER_ELEVATOR
      task: board_elevator
      target: elevator_board
      location: inside_elevator_4f
      extra:
        mode: enter_elevator
        localization_mode: aruco_odom

    # Manual step: press the 5F button.

    - state: WAIT_5F
      task: check_floor
      target: floor_5_marker
      location: floor_5_marker
      extra:
        expected_floor: 5
        floor_topic: /tag/floor_id

    - state: EXIT_ELEVATOR
      task: exit_elevator
      target: elevator_exit_5f
      location: floor_5_marker
      extra:
        mode: exit_elevator
        localization_mode: aruco_odom

    - state: SWITCH_5F_MAP
      task: map_switch
      target: map_5f
      location: map_5f

    - state: GO_TO_TARGET_PLACE
      task: go_to
      target: "$delivery_location"
      location: "$delivery_location"

    - state: RETURN_TO_ELEVATOR
      task: go_to
      target: elevator_front
      location: elevator_front_5f

    - state: ALIGN_ELEVATOR_TAG_RETURN
      task: dock_to_marker
      target: elevator_panel_5f
      location: elevator_panel_5f
      extra:
        tag_pose_topic: /tag_pose
        cmd_vel_topic: /cmd_vel

    # Manual step: press the 5F elevator call button.

    - state: WAIT_ELEVATOR_OPEN_RETURN
      task: wait_door_open
      target: elevator_door_5f
      location: elevator_door_5f
      extra:
        scan_topic: /scan_filtered

    - state: ENTER_ELEVATOR_RETURN
      task: board_elevator
      target: elevator_board
      location: inside_elevator_5f
      extra:
        mode: enter_elevator
        localization_mode: aruco_odom

    # Manual step: press the 4F button.

    - state: WAIT_4F
      task: check_floor
      target: floor_4_marker
      location: floor_4_marker
      extra:
        expected_floor: 4
        floor_topic: /tag/floor_id

    - state: EXIT_ELEVATOR_RETURN
      task: exit_elevator
      target: elevator_exit_4f
      location: floor_4_marker
      extra:
        mode: exit_elevator
        localization_mode: aruco_odom

    - state: SWITCH_4F_MAP
      task: map_switch
      target: map_4f
      location: map_4f

    - state: RETURN_HOME
      task: go_to
      target: home
      location: home
