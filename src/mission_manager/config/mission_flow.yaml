mission:
  name: dock_object_room_delivery

  steps:
    - state: GO_TO_PICKUP_ZONE
      task: go_to
      target: "$pickup_location"
      location: "$pickup_location"

    - state: PICK_OBJECT
      task: pick
      target: "$object_label"
      location: "$pickup_location"

    - state: GO_TO_ELEVATOR_STAGING
      task: go_to
      target: "$pickup_elevator_front_location"
      location: "$pickup_elevator_front_location"
      skip_if_same_floor: true

    - state: DOCK_TO_OUTER_PANEL
      task: dock_to_marker
      target: "$pickup_elevator_panel_location"
      location: "$pickup_elevator_panel_location"
      skip_if_same_floor: true

    - state: PRESS_CALL_BUTTON
      task: press_button
      target: "$pickup_elevator_call_button_location"
      location: "$pickup_elevator_call_button_location"
      skip_if_same_floor: true

    - state: RIDE_ELEVATOR
      task: elevator_ride
      target: elevator_ride
      location: target_floor_marker
      skip_if_same_floor: true
      extra:
        fsm_states:
          - WAIT_BOARD
          - BOARDING
          - RIDING
          - EXITING
          - DONE
        boarding_location: "$pickup_door_center_location"
        exit_location: target_floor_exit

    - state: GO_TO_DELIVERY_ZONE
      task: go_to
      target: "$delivery_location"
      location: "$delivery_location"

    - state: PLACE_OBJECT
      task: place
      target: "$delivery_location"
      location: "$delivery_location"
