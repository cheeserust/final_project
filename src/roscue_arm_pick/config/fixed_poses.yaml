calibration:
  # Values below come from the final central-server PDF (2026-07-11).
  complete: true
  # Numerical integration is complete, but no physical robot was available
  # in this workspace for the final button/pick verification.
  field_verified: false
  source: "final central-server PDF"
  notes:
    - "observe_cabin_5_button was not supplied; cabin-4 observation pose is used."
    - "The supplied cabin J3=91.5 deg exceeded the +90 deg limit and is clamped."

joint_order:
  arm:
    - base_joint
    - arm_joint_1
    - arm_joint_2
    - arm_joint_3
    - arm_joint_4
  gripper:
    - finger_1_base_joint
    - finger_1_middle_joint
    - finger_1_tip_joint
    - finger_2_base_joint
    - finger_2_middle_joint
    - finger_2_tip_joint
    - finger_3_base_joint
    - finger_3_middle_joint
    - finger_3_tip_joint

