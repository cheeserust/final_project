mission_allowed_tasks:
  - arm_ready
  - pickup_object_1_to_tray
  - deliver_object_1_from_tray
  - press_elevator_up
  - press_elevator_down
  - press_floor_4
  - press_floor_5

tasks:
  home:
    type: named_arm_pose
    pose_name: travel_stow
    start_pose: none
    return_pose: none

  arm_ready:
    type: named_arm_gripper_pose
    pose_name: ready
    gripper_pose_name: open
    start_pose: none
    return_pose: none

  pickup_object_1_to_tray:
    type: pick_to_named_place
    marker_id: 54
    object_key: object_1
    observe_pose: observe_pickup_402
    place_pose_name: tray_drop
    start_pose: ready
    return_pose: ready

  deliver_object_1_from_tray:
    type: transfer_named_pose
    object_key: object_1
    pickup_pose_name: tray_pick
    delivery_pose_name: delivery_5f
    start_pose: ready
    return_pose: ready

  press_elevator_up:
    type: press_button
    marker_id: 50
    observe_pose: observe_call_4f
    start_pose: ready
    # ready starts in parallel with the delayed base approach in the coordinator.
    return_pose: none

  press_floor_4:
    type: press_button
    marker_id: 51
    observe_pose: observe_cabin_4_button
    start_pose: ready
    return_pose: ready

  press_floor_5:
    type: press_button
    marker_id: 52
    observe_pose: observe_cabin_5_button
    start_pose: ready
    return_pose: ready

  press_elevator_down:
    type: press_button
    marker_id: 53
    observe_pose: observe_call_5f
    start_pose: ready
    return_pose: none

  # Backward-compatible aliases for manual/debug commands.
  pick_object_1:
    type: alias
    target: pickup_object_1_to_tray
  pick_object_1_to_tray:
    type: alias
    target: pickup_object_1_to_tray
  place_to_table:
    type: alias
    target: deliver_object_1_from_tray
  press_4f:
    type: alias
    target: press_floor_4
  press_5f:
    type: alias
    target: press_floor_5

