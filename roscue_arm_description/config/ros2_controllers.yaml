# Generated ros2_control controllers
# Publishes joint states on: /joint_states
# Command topics use: /<controller_name>/commands
/**:
  controller_manager:
    ros__parameters:
      update_rate: 100

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      position_controller:
        type: forward_command_controller/ForwardCommandController
      velocity_controller:
        type: forward_command_controller/ForwardCommandController

  joint_state_broadcaster:
    ros__parameters: {}

  # Command topic: /position_controller/commands
  position_controller:
    ros__parameters:
      joints: [arm_joint_1, arm_joint_2, arm_joint_3, arm_joint_4, base_joint, finger_1_base_joint, finger_1_middle_joint, finger_1_tip_joint, finger_2_base_joint, finger_2_middle_joint, finger_2_tip_joint, finger_3_base_joint, finger_3_middle_joint, finger_3_tip_joint]
      interface_name: position

  # Command topic: /velocity_controller/commands
  velocity_controller:
    ros__parameters:
      joints: [arm_joint_1, arm_joint_2, arm_joint_3, arm_joint_4, base_joint, finger_1_base_joint, finger_1_middle_joint, finger_1_tip_joint, finger_2_base_joint, finger_2_middle_joint, finger_2_tip_joint, finger_3_base_joint, finger_3_middle_joint, finger_3_tip_joint]
      interface_name: velocity
