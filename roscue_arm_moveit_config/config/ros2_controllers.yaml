controller_manager:
  ros__parameters:
    update_rate: 100

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - base_joint
      - arm_joint_1
      - arm_joint_2
      - arm_joint_3
      - arm_joint_4
      - finger_1_base_joint
      - finger_1_middle_joint
      - finger_1_tip_joint
      - finger_2_base_joint
      - finger_2_middle_joint
      - finger_2_tip_joint
      - finger_3_base_joint
      - finger_3_middle_joint
      - finger_3_tip_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    allow_nonzero_velocity_at_trajectory_end: true