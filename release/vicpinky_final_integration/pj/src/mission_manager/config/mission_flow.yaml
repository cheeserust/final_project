mission:
  name: final_402_to_5f_delivery_and_return

  # PDF final scenario, executed from one /mission/execute goal.
  # The GUI default pickup is 402 and RETURN_HOME resolves to the selected
  # pickup location, so the fixed demo is 402 -> object_place -> 402.
  steps:
    - state: ARM_HOMING
      task: homing
      target: robot_arm
      location: "$pickup_location"

    - state: ARM_READY_AT_PICKUP
      task: arm_execute
      target: robot_arm
      location: "$pickup_location"
      extra:
        arm_task_name: arm_ready

    - state: PICK_OBJECT_TO_TRAY
      task: arm_execute
      target: "$object_label"
      location: "$pickup_location"
      extra:
        arm_task_name: pickup_object_1_to_tray

    - state: GO_TO_ELEVATOR_FRONT
      task: go_to
      target: elevator_front
      location: elevator_front_4f

    - state: ALIGN_ELEVATOR_TAG
      task: dock_to_marker
      target: elevator_panel_4f
      location: elevator_panel_4f
      extra:
        target_distance_m: 1.27
        target_lateral_m: 0.0
        aligned_hold_sec: 3.0

    - state: PRESS_ELEVATOR_CALL_BUTTON
      task: press_button
      target: elevator_call_button_4f
      location: elevator_call_button_4f
      extra:
        button_role: elevator_call

    # This action starts arm_ready immediately and starts the 27 cm base move
    # two seconds later. Both children must succeed before rotation begins.
    - state: READY_AND_APPROACH_ELEVATOR_4F
      task: ready_and_approach
      target: elevator_door_4f
      location: elevator_door_4f
      extra:
        arm_task_name: arm_ready
        arm_start_to_drive_delay_sec: 2.0
        distance_m: 0.27
        speed_mps: 0.15

    - state: FACE_ELEVATOR_4F
      task: base_rotate
      target: left
      location: elevator_door_4f
      extra:
        angle_deg: 80.0

    # Preserve the driving team's LiDAR-based door-open gate.
    - state: WAIT_ELEVATOR_OPEN
      task: wait_door_open
      target: elevator_door_4f
      location: elevator_door_4f
      extra:
        scan_topic: /scan_filtered

    - state: ENTER_ELEVATOR
      task: board_elevator
      target: elevator_board
      location: inside_elevator_4f
      extra:
        target_distance_cm: 50.0

    - state: PRESS_5F_BUTTON
      task: press_button
      target: elevator_button_5f
      location: elevator_button_5f
      extra:
        button_role: floor_select
        button_floor: 5

    - state: WAIT_5F
      task: check_floor
      target: floor_5_marker
      location: floor_5_marker
      extra:
        expected_floor: 5

    - state: EXIT_ELEVATOR
      task: exit_elevator
      target: elevator_exit_5f
      location: floor_5_marker
      extra:
        # Only the landing marker/wall (ID 5): keep 10 cm more clearance.
        exit_target_distance_cm: 70.0

    # Pinky map switching is intentionally after physical exit.
    - state: SWITCH_5F_MAP
      task: map_switch
      target: map_5f
      location: map_5f

    - state: GO_TO_TARGET_PLACE
      task: go_to
      target: "$delivery_location"
      location: "$delivery_location"
      extra:
        # Allow AMCL/TF/global costmap to settle after SWITCH_5F_MAP.
        start_delay_sec: 3.0

    - state: ROTATE_AT_DELIVERY
      task: base_rotate
      target: left
      location: "$delivery_location"
      extra:
        angle_deg: 180.0

    - state: DELIVER_OBJECT_FROM_TRAY
      task: arm_execute
      target: "$delivery_location"
      location: "$delivery_location"
      extra:
        object_label: "$object_label"
        arm_task_name: "$arm_task_name"

    - state: RETURN_TO_ELEVATOR
      task: go_to
      target: elevator_front
      location: elevator_front_5f

    - state: ALIGN_ELEVATOR_TAG_RETURN
      task: dock_to_marker
      target: elevator_panel_5f
      location: elevator_panel_5f
      extra:
        target_distance_m: 1.27
        target_lateral_m: 0.0
        aligned_hold_sec: 3.0

    - state: PRESS_ELEVATOR_CALL_BUTTON_RETURN
      task: press_button
      target: elevator_call_button_5f
      location: elevator_call_button_5f
      extra:
        button_role: elevator_call

    - state: READY_AND_APPROACH_ELEVATOR_5F
      task: ready_and_approach
      target: elevator_door_5f
      location: elevator_door_5f
      extra:
        arm_task_name: arm_ready
        arm_start_to_drive_delay_sec: 2.0
        distance_m: 0.27
        speed_mps: 0.15

    - state: FACE_ELEVATOR_5F
      task: base_rotate
      target: left
      location: elevator_door_5f
      extra:
        angle_deg: 80.0

    # Preserve the driving team's LiDAR-based door-open gate.
    - state: WAIT_ELEVATOR_OPEN_RETURN
      task: wait_door_open
      target: elevator_door_5f
      location: elevator_door_5f
      extra:
        scan_topic: /scan_filtered

    - state: ENTER_ELEVATOR_RETURN
      task: board_elevator
      target: elevator_board
      location: inside_elevator_5f
      extra:
        target_distance_cm: 50.0

    - state: PRESS_4F_BUTTON
      task: press_button
      target: elevator_button_4f
      location: elevator_button_4f
      extra:
        button_role: floor_select
        button_floor: 4

    - state: WAIT_4F
      task: check_floor
      target: floor_4_marker
      location: floor_4_marker
      extra:
        expected_floor: 4

    - state: EXIT_ELEVATOR_RETURN
      task: exit_elevator
      target: elevator_exit_4f
      location: floor_4_marker
      extra:
        # Only the landing marker/wall (ID 4): keep 10 cm more clearance.
        exit_target_distance_cm: 70.0

    - state: SWITCH_4F_MAP
      task: map_switch
      target: map_4f
      location: map_4f

    - state: RETURN_HOME
      task: go_to
      target: "$pickup_location"
      location: "$pickup_location"
      extra:
        # Allow AMCL/TF/global costmap to settle after SWITCH_4F_MAP.
        start_delay_sec: 3.0
