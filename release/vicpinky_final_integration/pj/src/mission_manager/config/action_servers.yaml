actions:
  go_to:
    server: /nav/go_to
    task_id: go_to
    timeout_sec: 180.0
    retry: 1

  dock_to_marker:
    server: /dock/align
    task_id: dock_to_marker
    timeout_sec: 120.0
    retry: 1

  board_elevator:
    server: /elevator/board
    task_id: board_elevator
    timeout_sec: 300.0
    retry: 0

  exit_elevator:
    server: /elevator/exit
    task_id: exit_elevator
    timeout_sec: 300.0
    retry: 0

  pick:
    server: /arm/pick
    task_id: pick
    timeout_sec: 40.0
    retry: 0

  place:
    server: /arm/place
    task_id: place
    timeout_sec: 40.0
    retry: 0

  arm_execute:
    server: /arm/execute
    task_id: arm_execute
    timeout_sec: 240.0
    retry: 0

  press_button:
    server: /arm/press_button
    task_id: press_button
    timeout_sec: 180.0
    retry: 0

  homing:
    server: /arm/homing
    task_id: homing
    timeout_sec: 180.0
    retry: 0

  ready_and_approach:
    server: /mission/ready_and_approach
    task_id: ready_and_approach
    timeout_sec: 90.0
    retry: 0

  base_drive_straight:
    server: /base/drive_straight
    task_id: drive_straight
    timeout_sec: 30.0
    retry: 0

  base_rotate:
    server: /base/rotate
    task_id: rotate
    timeout_sec: 30.0
    retry: 0

  wait_door_open:
    server: /elevator/wait_door_open
    task_id: wait_door_open
    timeout_sec: 60.0
    retry: 0

  check_floor:
    server: /floor/check
    task_id: check_floor
    timeout_sec: 150.0
    retry: 1

  map_switch:
    server: /map/switch
    task_id: map_switch
    timeout_sec: 30.0
    retry: 1

  operator_confirm:
    server: /operator/confirm
    task_id: operator_confirm
    # Intentional infinite wait. Mission Cancel still cancels this action.
    timeout_sec: .inf
    retry: 0
