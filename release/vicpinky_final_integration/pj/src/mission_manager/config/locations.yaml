locations:
  # Legacy aliases that are still convenient for mission goals.
  dock:
    floor: 4
    point: dock
    marker_id: -1
    type: dock

  object:
    floor: 4
    point: "402"
    marker_id: -1
    type: pickup_zone

  pickup_zone:
    floor: 4
    point: "402"
    marker_id: -1
    type: pickup_zone

  delivery_zone:
    floor: "$target_floor"
    marker_id: -1
    type: delivery_zone

  # Marker/button/map tasks do not own global map coordinates.
  elevator_panel_4f:
    floor: 4
    marker_id: 20
    type: docking_target

  elevator_call_button_4f:
    floor: 4
    marker_id: 50
    type: button_target

  elevator_door_4f:
    floor: 4
    marker_id: -1
    type: elevator_door

  door_center_4f:
    floor: 4
    marker_id: 10
    type: docking_target

  inside_elevator_4f:
    floor: 4
    marker_id: 10
    type: elevator_inside
    extra:
      tag_pose_topic: /tag_pose
      cmd_vel_topic: /cmd_vel
      localization_mode: aruco_odom

  elevator_inside_panel:
    floor: "$target_floor"
    marker_id: -1
    type: docking_target
    extra:
      tag_pose_topic: /tag_pose
      cmd_vel_topic: /cmd_vel
      localization_mode: aruco_odom

  elevator_button_5f:
    floor: 4
    marker_id: 52
    type: button_target
    extra:
      button_floor: 5

  floor_4_marker:
    floor: 4
    marker_id: 4
    type: floor_marker
    extra:
      expected_floor: 4
      floor_topic: /tag/floor_id

  map_4f:
    floor: 4
    marker_id: -1
    type: map_switch
    extra:
      map_name: 4F
      map_yaml: 4F.yaml
      initial_pose_location: elevator_front_4f

  elevator_panel_5f:
    floor: 5
    marker_id: 20
    type: docking_target

  elevator_call_button_5f:
    floor: 5
    marker_id: 53
    type: button_target

  elevator_door_5f:
    floor: 5
    marker_id: -1
    type: elevator_door

  door_center_5f:
    floor: 5
    marker_id: 10
    type: docking_target

  inside_elevator_5f:
    floor: 5
    marker_id: 10
    type: elevator_inside
    extra:
      tag_pose_topic: /tag_pose
      cmd_vel_topic: /cmd_vel
      localization_mode: aruco_odom

  elevator_button_4f:
    floor: 5
    marker_id: 51
    type: button_target
    extra:
      button_floor: 4

  floor_5_marker:
    floor: 5
    marker_id: 5
    type: floor_marker
    extra:
      expected_floor: 5
      floor_topic: /tag/floor_id

  map_5f:
    floor: 5
    marker_id: -1
    type: map_switch
    extra:
      map_name: 5F
      map_yaml: 5F.yaml
      initial_pose_location: elevator_front_5f

  target_floor_exit:
    floor: "$target_floor"
    type: navigation_goal
    marker_id_by_floor:
      4: 4
      5: 5

  target_floor_marker:
    floor: "$target_floor"
    type: floor_marker
    marker_id_by_floor:
      4: 4
      5: 5

  pickup_floor_exit:
