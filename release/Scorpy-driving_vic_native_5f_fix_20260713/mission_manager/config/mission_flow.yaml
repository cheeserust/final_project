mission:
  name: final_4f_5f_elevator_mission

  # Final scenario:
  # 4F pickup location -> pick object -> 4F Elevator Front
  # -> call elevator -> enter elevator -> move to 5F
  # -> go to delivery location -> place object -> 5F Elevator Front
  # -> call elevator -> enter elevator -> move to 4F
  # -> return to original pickup location.
  #
  # DONE is emitted by mission_manager after the last step succeeds.
  steps:
    - state: PICK_OBJECT_AT_START
      task: pick
      target: "$pickup_location"
      location: "$pickup_location"
      extra:
        object_label: "$object_label"

    - state: GO_TO_ELEVATOR_FRONT_4F
      task: go_to
      target: elevator_front_4f
      location: elevator_front_4f

    - state: ALIGN_ELEVATOR_TAG_4F
      task: dock_to_marker
      target: elevator_panel_4f
      location: elevator_panel_4f
      extra:
        tag_pose_topic: /tag_pose
        cmd_vel_topic: /cmd_vel

    - state: PRESS_ELEVATOR_CALL_BUTTON_4F
      task: press_button
      target: elevator_call_button_4f
      location: elevator_call_button_4f
      extra:
        button_role: elevator_call

    - state: WAIT_ELEVATOR_OPEN_4F
      task: wait_door_open
      target: elevator_door_4f
      location: elevator_door_4f
      extra:
        scan_topic: /scan_filtered

    - state: ENTER_ELEVATOR_4F
      task: dock_to_marker
      target: inside_elevator_4f
      location: inside_elevator_4f
      extra:
        mode: enter_elevator
        localization_mode: aruco_odom

    - state: ALIGN_INSIDE_ELEVATOR_TAG_TO_5F
      task: dock_to_marker
      target: elevator_inside_panel
      location: elevator_inside_panel
      extra:
        mode: inside_elevator_panel_align
        localization_mode: aruco_odom

    - state: PRESS_5F_BUTTON
      task: press_button
      target: elevator_button_5f
      location: elevator_button_5f
      extra:
        button_role: floor_select
        button_floor: 5

    - state: WAIT_5F
      task: check_floor
      target: floor_5_marker
      location: floor_5_marker
      extra:
        expected_floor: 5
        floor_topic: /tag/floor_id

    - state: EXIT_ELEVATOR_5F
      task: exit_elevator
      target: floor_5_marker
      location: floor_5_marker
      extra:
        # ID 5 landing marker only. Boarding marker ID 10 stays unchanged.
        exit_target_distance_cm: 70.0

    - state: SWITCH_5F_MAP
      task: map_switch
      target: map_5f
      location: map_5f

    - state: GO_TO_DELIVERY_LOCATION
      task: go_to
      target: "$delivery_location"
      location: "$delivery_location"
      extra:
        # Let AMCL, TF and the global costmap settle before native Nav2.
        start_delay_sec: 3.0

    - state: PLACE_OBJECT_AT_DELIVERY
      task: place
      target: "$delivery_location"
      location: "$delivery_location"
      extra:
        object_label: "$object_label"

    - state: RETURN_TO_ELEVATOR_5F
      task: go_to
      target: elevator_front_5f
      location: elevator_front_5f

    - state: ALIGN_ELEVATOR_TAG_5F
      task: dock_to_marker
      target: elevator_panel_5f
      location: elevator_panel_5f
      extra:
        tag_pose_topic: /tag_pose
        cmd_vel_topic: /cmd_vel

    - state: PRESS_ELEVATOR_CALL_BUTTON_5F
      task: press_button
      target: elevator_call_button_5f
      location: elevator_call_button_5f
      extra:
        button_role: elevator_call

    - state: WAIT_ELEVATOR_OPEN_5F
      task: wait_door_open
      target: elevator_door_5f
      location: elevator_door_5f
      extra:
        scan_topic: /scan_filtered

    - state: ENTER_ELEVATOR_5F
      task: dock_to_marker
      target: inside_elevator_5f
      location: inside_elevator_5f
      extra:
        mode: enter_elevator
        localization_mode: aruco_odom

    - state: ALIGN_INSIDE_ELEVATOR_TAG_TO_4F
      task: dock_to_marker
      target: elevator_inside_panel
      location: elevator_inside_panel
      extra:
        mode: inside_elevator_panel_align
        localization_mode: aruco_odom

    - state: PRESS_4F_BUTTON
      task: press_button
      target: elevator_button_4f
      location: elevator_button_4f
      extra:
        button_role: floor_select
        button_floor: 4

    - state: WAIT_4F
      task: check_floor
      target: floor_4_marker
      location: floor_4_marker
      extra:
        expected_floor: 4
        floor_topic: /tag/floor_id

    - state: EXIT_ELEVATOR_4F
      task: exit_elevator
      target: floor_4_marker
      location: floor_4_marker
      extra:
        # ID 4 landing marker only. Boarding marker ID 10 stays unchanged.
        exit_target_distance_cm: 70.0

    - state: SWITCH_4F_MAP
      task: map_switch
      target: map_4f
      location: map_4f

    - state: RETURN_TO_START
      task: go_to
      target: "$pickup_location"
      location: "$pickup_location"
      extra:
        # Apply the same map-settle guard after returning to 4F.
        start_delay_sec: 3.0
